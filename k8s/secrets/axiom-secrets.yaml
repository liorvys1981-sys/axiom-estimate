# k8s/secrets/axiom-secrets.yaml
# NOTE: This file contains PLACEHOLDER values only.
# Real secrets are injected at runtime via Google Secret Manager + Workload Identity.
# The ExternalSecret resource below (requires External Secrets Operator) handles injection.
# See docs/operations.md for setup instructions.
---
# Placeholder secret — actual values are NEVER stored here.
# The init-container in each deployment validates that the real values are present.
apiVersion: v1
kind: Secret
metadata:
  name: axiom-placeholder-secret
  namespace: axiom-production
  annotations:
    secret-manager/managed: "true"
type: Opaque
stringData:
  DATABASE_URL: "INJECTED_BY_SECRET_MANAGER"
  JWT_SECRET_KEY: "INJECTED_BY_SECRET_MANAGER"
  STRIPE_SECRET_KEY: "INJECTED_BY_SECRET_MANAGER"
  OPENAI_API_KEY: "INJECTED_BY_SECRET_MANAGER"
  REDIS_URL: "INJECTED_BY_SECRET_MANAGER"
  SMTP_PASSWORD: "INJECTED_BY_SECRET_MANAGER"
---
# SecretStore — connects to Google Secret Manager via Workload Identity
# Prerequisite: External Secrets Operator must be installed in the cluster.
# Install: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: axiom-gcp-secret-store
  namespace: axiom-production
spec:
  provider:
    gcpsm:
      projectID: axiom-estimate-prod
      auth:
        workloadIdentity:
          clusterLocation: us-east1
          clusterName: axiom-autopilot-prod
          serviceAccountRef:
            name: axiom-service-account
---
# ExternalSecret — pulls secrets from GCP Secret Manager into a k8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: axiom-external-secrets
  namespace: axiom-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: axiom-gcp-secret-store
    kind: SecretStore
  target:
    name: axiom-runtime-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: axiom-database-url
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: axiom-jwt-secret
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: axiom-stripe-secret-key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: axiom-openai-api-key
    - secretKey: REDIS_URL
      remoteRef:
        key: axiom-redis-url
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: axiom-smtp-password

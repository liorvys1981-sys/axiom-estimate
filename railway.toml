[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 5
restartPolicyType = "on_failure"

[deploy.variables]
APP_ENV = "production"
LOG_LEVEL = "INFO"
SERVICE_NAME = "axiom-estimate"
